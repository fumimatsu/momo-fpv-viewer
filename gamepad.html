<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FPV RC Gamepad Test</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #101214;
      color: #f4f6f8;
    }

    body {
      margin: 0;
      padding: 24px;
    }

    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
    }

    .status {
      color: #9fb3c8;
      font-size: 14px;
    }

    .notice {
      margin-bottom: 18px;
      color: #d6e2f0;
      line-height: 1.55;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin: 0 0 16px;
    }

    button {
      min-height: 34px;
      padding: 0 12px;
      color: #f4f6f8;
      border: 1px solid #46515f;
      border-radius: 6px;
      background: #222933;
      font: inherit;
      cursor: pointer;
    }

    .viewer-link {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 12px;
      color: #f4f6f8;
      border: 1px solid #46515f;
      border-radius: 6px;
      background: #1d3348;
      text-decoration: none;
    }

    button:hover {
      background: #2b3440;
    }

    .mapping-options label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 34px;
      color: #d6e2f0;
      font-size: 14px;
    }

    .mapping-options input[type="number"] {
      width: 72px;
      min-height: 30px;
      padding: 0 8px;
      color: #f4f6f8;
      border: 1px solid #46515f;
      border-radius: 6px;
      background: #10151b;
    }

    .assign-status {
      color: #7adf8f;
      font-family: Consolas, monospace;
      font-size: 13px;
      min-height: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 14px;
    }

    .pad {
      border: 1px solid #39424d;
      border-radius: 8px;
      padding: 14px;
      background: #171b20;
    }

    .pad h2 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .meta {
      color: #afbfce;
      font-family: Consolas, monospace;
      font-size: 13px;
      line-height: 1.45;
      word-break: break-all;
    }

    .row {
      display: grid;
      grid-template-columns: 76px 76px 76px 76px 70px 1fr;
      align-items: center;
      gap: 10px;
      margin: 8px 0;
      font-family: Consolas, monospace;
      font-size: 13px;
    }

    .row.header {
      color: #91a4b7;
      margin-top: 12px;
    }

    .row.recent {
      color: #ffffff;
      text-shadow: 0 0 8px rgba(95, 192, 255, 0.75);
    }

    .bar {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: #2c343e;
    }

    .fill {
      width: 50%;
      height: 100%;
      background: #5fc0ff;
    }

    .button-on .fill {
      background: #7adf8f;
    }

    .actions {
      grid-column: 1 / -1;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: -2px 0 6px 86px;
    }

    .actions button {
      min-height: 28px;
      padding: 0 9px;
      font-size: 12px;
    }

    .actions button.assigned {
      border-color: #7adf8f;
      background: #1d3b29;
      color: #ffffff;
    }

    .mapping {
      margin: 18px 0 0;
      border: 1px solid #39424d;
      border-radius: 8px;
      background: #171b20;
    }

    .mapping h2 {
      margin: 0;
      padding: 12px 14px;
      font-size: 16px;
      border-bottom: 1px solid #39424d;
    }

    .mapping pre {
      margin: 0;
      padding: 14px;
      overflow: auto;
      color: #d6e2f0;
      font-family: Consolas, monospace;
      font-size: 13px;
      line-height: 1.45;
    }

    .empty {
      padding: 18px;
      color: #f4c66a;
      border: 1px dashed #5f5642;
      border-radius: 8px;
      background: #1d1a12;
    }
  </style>
</head>
<body>
  <header>
    <h1>FPV RC Gamepad Test</h1>
    <div id="status" class="status">waiting</div>
  </header>
  <div class="notice">
    Click this page, then move only one control at a time. Use min/max/recent changes to identify steering, throttle, brake, and drive buttons.
  </div>
  <div class="toolbar">
    <button id="resetCalibration" type="button">Reset calibration</button>
    <button id="copyMapping" type="button">Copy mapping</button>
    <button id="saveMapping" type="button">Save for Viewer</button>
    <button id="clearMapping" type="button">Clear saved</button>
    <a id="openViewer" class="viewer-link" href="./viewer.html" target="_blank" rel="noreferrer">Open Viewer</a>
    <div id="assignStatus" class="assign-status"></div>
  </div>
  <div class="toolbar mapping-options">
    <label><input id="steeringInvert" type="checkbox"> Steering invert</label>
    <label><input id="throttleInvert" type="checkbox"> Throttle invert</label>
    <label><input id="brakeInvert" type="checkbox"> Brake invert</label>
    <label>Steering gain <input id="steeringGain" type="number" min="0.2" max="8" step="0.05" value="4"></label>
    <label>Steering deadzone <input id="steeringDeadzone" type="number" min="0" max="0.5" step="0.01" value="0.03"></label>
    <label>Pedal deadzone <input id="pedalDeadzone" type="number" min="0" max="0.5" step="0.01" value="0.05"></label>
  </div>
  <div class="toolbar">
    <button class="captureButton" type="button" data-label="idle">Capture idle</button>
    <button class="captureButton" type="button" data-label="steering_left">Capture steering left</button>
    <button class="captureButton" type="button" data-label="steering_right">Capture steering right</button>
    <button class="captureButton" type="button" data-label="throttle_released">Capture throttle released</button>
    <button class="captureButton" type="button" data-label="throttle_pressed">Capture throttle pressed</button>
    <button class="captureButton" type="button" data-label="brake_released">Capture brake released</button>
    <button class="captureButton" type="button" data-label="brake_pressed">Capture brake pressed</button>
  </div>
  <main id="pads" class="grid"></main>
  <section class="mapping">
    <h2>Generated mapping</h2>
    <pre id="mappingOutput">{}</pre>
  </section>
  <script src="./gamepad.js"></script>
</body>
</html>

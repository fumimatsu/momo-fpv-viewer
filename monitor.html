<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050608">
  <title>Momo FPV Monitor</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: ui-monospace, "Cascadia Mono", "Consolas", monospace;
      background: #050608;
      color: #f4f7fb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background: #050608;
      color: #f4f7fb;
    }

    .top {
      position: sticky;
      top: 0;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr auto auto auto auto auto auto;
      gap: 10px;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(5, 6, 8, 0.92);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0;
    }

    input,
    select,
    button {
      min-height: 36px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.06);
      color: #f4f7fb;
      font: inherit;
    }

    input {
      width: min(620px, 48vw);
      padding: 0 10px;
    }

    #lockTokenInput {
      width: min(280px, 22vw);
    }

    select {
      min-width: 0;
      padding: 0 8px;
    }

    button {
      padding: 0 14px;
      cursor: pointer;
    }

    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      padding: 12px 16px 0;
      color: #c8d0dc;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 12px;
      padding: 16px;
    }

    .tile {
      min-height: 190px;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.04);
    }

    .tile.ok {
      border-color: rgba(70, 210, 130, 0.55);
    }

    .tile.standby {
      border-color: rgba(80, 170, 255, 0.55);
    }

    .tile.connected,
    .tile.viewer {
      border-color: rgba(120, 230, 255, 0.6);
    }

    .tile.drive {
      border-color: rgba(255, 105, 105, 0.72);
    }

    .tile.warn {
      border-color: rgba(240, 190, 70, 0.65);
    }

    .tile.down {
      border-color: rgba(230, 80, 90, 0.7);
    }

    .head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
      margin-bottom: 10px;
    }

    .name {
      font-size: 18px;
      font-weight: 700;
    }

    .state {
      font-weight: 700;
    }

    .ok .state {
      color: #6ff0a4;
    }

    .standby .state {
      color: #91c7ff;
    }

    .connected .state,
    .viewer .state {
      color: #85f0ff;
    }

    .drive .state {
      color: #ff8383;
    }

    .warn .state {
      color: #ffd36c;
    }

    .down .state {
      color: #ff7580;
    }

    .kv {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr);
      gap: 5px 8px;
      font-size: 13px;
      line-height: 1.25;
    }

    .kv span:nth-child(odd) {
      color: #9ca6b5;
    }

    .kv span:nth-child(even) {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
      font-size: 13px;
    }

    .modeControls {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      margin-top: 12px;
    }

    .modeSelect {
      width: 100%;
      min-height: 32px;
      font-size: 12px;
    }

    .modeApply {
      min-height: 32px;
      padding: 0 10px;
      font-size: 12px;
    }

    .modeApply:disabled,
    .modeSelect:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    .modeMessage {
      grid-column: 1 / -1;
      min-height: 16px;
      color: #c8d0dc;
      font-size: 12px;
    }

    .roomControls {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      margin-top: 10px;
    }

    .roomMessage {
      grid-column: 1 / -1;
      min-height: 16px;
      color: #c8d0dc;
      font-size: 12px;
    }

    a {
      color: #91c7ff;
      text-decoration: none;
    }

    .viewerButton {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 0 12px;
      border: 1px solid rgba(111, 240, 164, 0.48);
      border-radius: 6px;
      color: #ffffff;
      background: rgba(70, 210, 130, 0.18);
      font-weight: 700;
    }

    .viewerButton.disabled {
      pointer-events: none;
      color: rgba(244, 247, 251, 0.42);
      border-color: rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      font-weight: 400;
    }

    .band {
      display: inline-block;
      min-width: 44px;
      padding: 1px 6px;
      border-radius: 999px;
      text-align: center;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.08);
    }

    .band-6 {
      color: #85f0ff;
      border: 1px solid rgba(133, 240, 255, 0.42);
    }

    .band-5 {
      color: #a8d6ff;
      border: 1px solid rgba(168, 214, 255, 0.42);
    }

    .band-24 {
      color: #ffd88a;
      border: 1px solid rgba(255, 216, 138, 0.46);
    }

    @media (max-width: 760px) {
      .top {
        grid-template-columns: 1fr;
      }

      input {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="top">
    <h1>Momo FPV Monitor</h1>
    <input id="hostsInput" type="text" autocomplete="off" spellcheck="false">
    <input id="lockTokenInput" type="password" placeholder="Lock token" autocomplete="off" spellcheck="false">
    <button id="applyHosts" type="button">Apply</button>
    <button id="refreshNow" type="button">Refresh</button>
    <button id="exportJson" type="button">JSON</button>
    <button id="exportCsv" type="button">CSV</button>
  </div>
  <div class="summary">
    <div>Online <strong id="onlineCount">0</strong>/<strong id="totalCount">0</strong></div>
    <div>Warn <strong id="warnCount">0</strong></div>
    <div>Down <strong id="downCount">0</strong></div>
    <div>Last <strong id="lastUpdate">n/a</strong></div>
  </div>
  <main id="grid" class="grid"></main>
  <script src="./monitor.js"></script>
</body>

</html>
